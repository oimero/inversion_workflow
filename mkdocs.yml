site_name: inversion workflow
site_description: 反演工作流
repo_name: inversion_workflow

theme:
  name: material
  language: zh
  features:
    - navigation.sections
    - navigation.top
    - toc.follow
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            docstring_style: numpy
            show_source: false
            show_root_heading: true
            show_root_toc_entry: true
            show_signature_annotations: true
            separate_signature: true
            show_if_no_docstring: false
            inherited_members: false
            load_external_modules: false

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - tables

nav:
  - 首页: index.md
  - 快速开始:
      - 数据与单位约定: concepts/data-and-coordinate-conventions.md
      - 脚本风格指南: concepts/script-style.md
  - 教程:
      - 常见问题: guide/0-troubleshooting.md
      - 01 井资产盘点: guide/1-well-inventory.md
      - 旁路 井轨迹 QC: guide/well-trajectory.md
      - 02 LAS 曲线筛选与导出: guide/2-well-screen.md
      - 03 测井预处理: guide/3-well-preprocess.md
      - 旁路 岩石物理分析: guide/rock-physics-analysis.md
      - 04 井震自动标定: guide/4-well-auto-tie.md
      - 05 全局共识子波生成: guide/5-wavelet-generation.md
      - 06 真实工区井控数据集: guide/6-real-field-well-controls.md
      - 旁路 正演可观测性分析: guide/forward-observability.md
      - 旁路 合成基准生成与评估: guide/synthoseis-lite-benchmark.md
      - 07 真实工区低频模型: guide/7-real-field-lfm.md
      - 08 R0 真实工区零样本预测: guide/8-r0-real-field-zero-shot.md
      - 08 R1 真实工区正演闭环诊断: guide/8-r1-real-field-forward-diagnostic.md
      - 平行工作流 深度域反演工作流: guide/depth-domain-workflow.md
  - API:
      - API 总览: api/index.md
      - cup:
          - 命名空间总览: api/cup/index.md
          - cup.config: api/cup/config.md
          - cup.lfm: api/cup/lfm.md
          - cup.physics: api/cup/physics.md
          - cup.petrel: api/cup/petrel.md
          - cup.seismic: api/cup/seismic.md
          - cup.well: api/cup/well.md
          - cup.utils: api/cup/utils.md
      - wtie:
          - 命名空间总览: api/wtie/index.md
          - wtie.modeling: api/wtie/modeling.md
          - wtie.learning: api/wtie/learning.md
          - wtie.processing: api/wtie/processing.md
          - wtie.optimize: api/wtie/optimize.md
          - wtie.utils: api/wtie/utils.md
