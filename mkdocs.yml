site_name: inversion workflow
site_description: 反演工作流
repo_name: inversion_workflow

theme:
  name: material
  language: zh
  features:
    - navigation.sections
    - navigation.top
    - toc.follow
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            docstring_style: numpy
            show_source: false
            show_root_heading: true
            show_root_toc_entry: true
            show_signature_annotations: true
            separate_signature: true
            show_if_no_docstring: false
            inherited_members: false
            load_external_modules: false

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - tables

nav:
  - 首页: index.md
  - 快速开始:
      - 核心 CSV 契约: concepts/csv-contracts.md
      - 数据与坐标约定: concepts/data-and-coordinate-conventions.md
      - 脚本风格指南: concepts/script-style.md
      - 时间域工作流总览: concepts/time-domain-workflow.md
  - 教程:
      - 01 井资产盘点: guide/1-well-inventory.md
      - 02 LAS 曲线筛选与导出: guide/2-well-screen.md
      - 03 测井预处理: guide/3-well-preprocess.md
      - 旁路 井轨迹 QC: guide/well-trajectory.md
      - 04 井震自动标定: guide/4-well-auto-tie.md
      - 05 全局子波生成: guide/5-wavelet-generation.md
      - 06 分频诊断与井约束: guide/6-well-constraints.md
      - 07 构建低频模型: guide/7-lfm-precomputed.md
      - 旁路 正演增益: guide/dynamic-gain.md
      - 08 GINN 训练: guide/8-ginn-train.md
      - 09 时间域 GINN 反演: guide/9-ginn-inversion.md
      - 常见问题: guide/troubleshooting.md
  - 架构与路线图:
      - 斜井支持的 src/cup 重构规划: guide/deviated-well-src-cup-refactor.md
      - Enhance 合成器重构规划: guide/enhance-synthetic-refactor.md
  - API:
      - API 总览: api/index.md
      - cup:
          - 命名空间总览: api/cup/index.md
          - cup.petrel: api/cup/petrel.md
          - cup.seismic: api/cup/seismic.md
          - cup.well: api/cup/well.md
          - cup.utils: api/cup/utils.md
      - wtie:
          - 命名空间总览: api/wtie/index.md
          - wtie.modeling: api/wtie/modeling.md
          - wtie.learning: api/wtie/learning.md
          - wtie.processing: api/wtie/processing.md
          - wtie.optimize: api/wtie/optimize.md
          - wtie.utils: api/wtie/utils.md
